name: Build CV

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v3
        with:
          root_file: CV_AldairBeltran.tex
      - uses: actions/upload-artifact@v4
        with:
          name: CV
          path: CV_AldairBeltran.pdf
      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CV_AldairBeltran.pdf
          git commit -m "ci: rebuild CV [skip ci]" || exit 0
          git push
